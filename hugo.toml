baseURL = 'https://forenche.github.io/'
locale = 'en-us'
title = "Forenche's Blogs"

# Theme
theme = "hugo-neso"

# Set image cache dir
[caches]
  [caches.images]
    dir = ':cacheDir/images'

# Configs required (and recommended) by neso
# Build
# --------------------------------

[minify]
  # Recommended: minify the generated output to improve page load time
  minifyOutput = true

# Required: Tailwind integration — start
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
  [[module.mounts]]
    source = 'static'
    target = 'static'
# Required: Tailwind integration — end


# Markdown
# --------------------------------

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      # Recommended: do not wrap <img> in <p> (the theme provides proper spacing)
      wrapStandAloneImageWithinParagraph = false

      [markup.goldmark.parser.attribute]
        # Required: enable attributes on block elements
        block = true

    [markup.goldmark.renderer]
      # Recommended: allow raw HTML in Markdown
      unsafe = true

  [markup.highlight]
    # Required: use CSS classes for code blocks so syntax highlighting works
    noClasses = false

  # Recommended: table of contents levels
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[menus]  # The `menus` table lives at the top level of TOML
  [[menus.main]]
    identifier = "posts"   # unique id
    name       = "Posts"   # text shown in the menu
    pageRef    = "/posts"  # your content section
    weight     = 10        # order (smaller appears earlier)
  [[menus.main]]
    identifier = "tags"
    name       = "Tags"
    pageRef    = "/tags"   # your taxonomy: tags, categories, etc.
    weight     = 20
  [[menus.main]]
    identifier = "categories"
    name       = "Categories"
    pageRef    = "/categories"  # your taxonomy: tags, categories, etc.
    weight     = 30
  # [[menus.main]]
  #   identifier = "archives"
  #   name       = "Archives"
  #   pageRef    = "/archives"  # archives page
  #   weight     = 40
  [[menus.main]]
    identifier = "search"
    name       = "Search"
    pageRef    = "/search"  # search page
    weight     = 50
  [[menus.main]]
    identifier = "github"
    name       = "GitHub"
    url        = "https://github.com/forenche"  # external link
    weight     = 60

# Params
[params]
  [params.neso] #Neso specific params
    support_theme_author = true
    display_mode = "profile"
    ext_link_indicator = true
    ext_link_new_window = true

  [params.neso.page]
  show_reading_time = true

  [params.neso.home.profile]
  avatar_image = "img/crying_cat.jpg"
  avatar_image_alt_text = "cat"
  avatar_image_size = 160
  avatar_image_size_sm = 120

  [[params.neso.home.profile.link_btns]]
    label = "Source Code"
    url   = "https://github.com/Forenche/forenche.github.io"

  [params.neso.home.list]
  featured_entries_limit = 5

  [params.neso.social]
    [[params.neso.social.links]]
      name = "Github"
      url  = "https://github.com/forenche"

    [[params.neso.social.links]]
      name = "email"
      url  = "forenche123@gmail.com"

[outputs]  # The `outputs` table lives at the top level of TOML
  home = ["html", "json"]  # Ask Hugo to emit a JSON index
